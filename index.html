<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bikeShop - ขับง่ายราคาประหยัด ใช้ได้ทุกวัยรับประกัน💯</title>
    
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome สำหรับ Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==========================================================================
           1. DESIGN SYSTEM & VARIABLES (Theme: Gold, Black, White)
           ========================================================================== */
        :root {
            /* Palette */
            --primary-dark: #111111;       /* ดำหลัก */
            --primary-light: #ffffff;      /* ขาวหลัก */
            --accent-gold: #c5a85c;        /* ทองหลัก (Muted Elegant Gold) */
            --accent-gold-bright: #f1d279; /* ทองสว่าง */
            --bg-dark-gray: #1a1a1a;       /* เทาเข้มสำหรับ Section สลับ */
            --text-dark: #222222;          /* สีตัวอักษรบนพื้นขาว */
            --text-light: #f5f5f5;         /* สีตัวอักษรบนพื้นดำ */
            --text-muted: #888888;
            
            /* Material Design 3 Elevation & Blurs */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.3);
            --glass-bg: rgba(17, 17, 17, 0.75);
            --glass-border: rgba(197, 168, 92, 0.2);
            --glass-blur: blur(12px);
            
            /* Layout & Transitions */
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-full: 9999px;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* ==========================================================================
           2. BASE STYLES & RESET
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: 'Kanit', 'Outfit', sans-serif;
            background-color: var(--primary-light);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition-smooth);
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        ul {
            list-style: none;
        }

        button, .btn {
            font-family: 'Kanit', sans-serif;
            cursor: pointer;
            border: none;
            outline: none;
            background: none;
            transition: var(--transition-smooth);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--primary-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-gold);
            border-radius: var(--radius-full);
            border: 2px solid var(--primary-dark);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-gold-bright);
        }

        /* Utility Components */
        .section-padding {
            padding: 100px 24px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .text-center {
            text-align: center;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-gold-bright));
            border-radius: var(--radius-full);
        }

        .section-subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 60px;
            font-weight: 300;
        }

        /* Buttons */
        .btn-gold {
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-bright));
            color: var(--primary-dark);
            padding: 14px 36px;
            font-weight: 600;
            border-radius: var(--radius-full);
            box-shadow: var(--shadow-sm);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }

        .btn-gold:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(197, 168, 92, 0.4);
            filter: brightness(1.05);
        }

        .btn-outline {
            border: 2px solid var(--accent-gold);
            color: var(--text-light);
            padding: 12px 34px;
            font-weight: 600;
            border-radius: var(--radius-full);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-outline:hover {
            background: var(--accent-gold);
            color: var(--primary-dark);
            transform: translateY(-3px);
        }

        /* ==========================================================================
           3. NAVIGATION BAR (Glassmorphism)
           ========================================================================== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(17, 17, 17, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition-smooth);
        }

        .header.scrolled {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--shadow-md);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 45px;
            height: 45px;
            border-radius: var(--radius-full);
            border: 2px solid var(--accent-gold);
            object-fit: cover;
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary-light);
            letter-spacing: 1px;
        }

        .logo-text span {
            color: var(--accent-gold);
        }

        .nav-menu {
            display: flex;
            gap: 32px;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 400;
            font-size: 1rem;
            position: relative;
            padding: 6px 0;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--accent-gold);
            transition: var(--transition-smooth);
        }

        .nav-link:hover, .nav-link.active {
            color: var(--accent-gold-bright);
        }

        .nav-link:hover::after, .nav-link.active::after {
            width: 100%;
        }

        .menu-toggle {
            display: none;
            color: var(--primary-light);
            font-size: 1.5rem;
        }

        /* ==========================================================================
           4. HERO SECTION (Banner Background)
           ========================================================================== */
        .hero {
            position: relative;
            height: 100vh;
            min-height: 650px;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.85)), 
                        url('https://img.magnific.com/premium-vector/abstract-white-gold-line-shapes-background-banner_249611-5750.jpg') no-repeat center center/cover;
            display: flex;
            align-items: center;
            color: var(--text-light);
            padding-top: 80px;
            overflow: hidden;
        }

        .hero-content {
            max-width: 700px;
            position: relative;
            z-index: 2;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.2s;
        }

        .hero-badge {
            background: rgba(197, 168, 92, 0.15);
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold-bright);
            padding: 6px 18px;
            border-radius: var(--radius-full);
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .hero-title span {
            background: linear-gradient(45deg, var(--accent-gold), var(--accent-gold-bright));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-slogan {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 32px;
            font-weight: 400;
            border-left: 4px solid var(--accent-gold);
            padding-left: 16px;
        }

        .hero-actions {
            display: flex;
            gap: 16px;
        }

        .hero-deco {
            position: absolute;
            right: 5%;
            top: 50%;
            transform: translateY(-50%);
            width: 45%;
            max-width: 550px;
            z-index: 1;
            opacity: 0;
            animation: fadeInRight 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.4s;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.7));
        }

        /* ==========================================================================
           5. ABOUT SECTION
           ========================================================================== */
        .about {
            background-color: var(--primary-light);
            color: var(--text-dark);
        }

        .about-wrapper {
            display: table;
            width: 100%;
            table-layout: fixed;
        }

        .about-column {
            display: table-cell;
            vertical-align: middle;
            width: 50%;
        }

        .about-image-side {
            padding-right: 60px;
        }

        .about-img-box {
            position: relative;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        .about-img-box img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            transition: var(--transition-smooth);
        }

        .about-img-box:hover img {
            transform: scale(1.05);
        }

        .about-content-side {
            padding-left: 20px;
        }

        .about-tag {
            color: var(--accent-gold);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: block;
        }

        .about-h3 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .about-desc {
            color: #555555;
            font-size: 1.1rem;
            margin-bottom: 32px;
        }

        .features-grid {
            display: table;
            width: 100%;
            margin-top: 20px;
        }

        .feature-item {
            display: table-cell;
            width: 50%;
            padding-right: 15px;
        }

        .feature-icon {
            width: 48px;
            height: 48px;
            background: rgba(197, 168, 92, 0.1);
            color: var(--accent-gold);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            margin-bottom: 16px;
        }

        .feature-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .feature-text {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* ==========================================================================
           6. PRODUCT SECTION (Grid Filters & Material Cards)
           ========================================================================== */
        .products {
            background-color: var(--bg-dark-gray);
            color: var(--text-light);
        }

        .filter-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 48px;
        }

        .filter-btn {
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-full);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--primary-light);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-bright));
            color: var(--primary-dark);
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(197, 168, 92, 0.3);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        .product-card {
            background: #222222;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition-smooth);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(197, 168, 92, 0.3);
        }

        .product-img-wrapper {
            position: relative;
            width: 100%;
            padding-top: 100px;
            background-color: #1a1a1a;
            overflow: hidden;
        }

        .product-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-smooth);
        }

        .product-card:hover .product-img {
            transform: scale(1.08);
        }

        .product-tag {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(17, 17, 17, 0.75);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            color: var(--accent-gold-bright);
            border: 1px solid rgba(197, 168, 92, 0.4);
            padding: 4px 12px;
            font-size: 0.8rem;
            font-weight: 500;
            border-radius: var(--radius-full);
            text-transform: uppercase;
        }

        .product-info {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .product-price {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--accent-gold-bright);
            font-family: 'Outfit', sans-serif;
        }

        .product-price span {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-left: 2px;
        }

        .btn-buy {
            background: rgba(197, 168, 92, 0.1);
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 8px 16px;
            border-radius: var(--radius-full);
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-buy:hover {
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-bright));
            color: var(--primary-dark);
            box-shadow: 0 4px 12px rgba(197, 168, 92, 0.2);
        }

        .product-card.fade-out {
            opacity: 0;
            transform: scale(0.9);
            display: none;
        }

        .product-card.fade-in {
            animation: cardReveal 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* ==========================================================================
           7. CONTACT SECTION
           ========================================================================== */
        .contact {
            background-color: var(--primary-light);
            color: var(--text-dark);
        }

        .contact-layout {
            display: table;
            width: 100%;
            table-layout: fixed;
        }

        .contact-column {
            display: table-cell;
            vertical-align: top;
            width: 50%;
        }

        .contact-info-side {
            padding-right: 50px;
        }

        .contact-map-side {
            padding-left: 10px;
        }

        .contact-lead {
            font-size: 1.2rem;
            color: #555555;
            margin-bottom: 40px;
        }

        .contact-cards-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .contact-card-item {
            background: #fafafa;
            border: 1px solid #eeeeee;
            padding: 20px;
            border-radius: var(--radius-md);
            display
